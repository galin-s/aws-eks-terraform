apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  source:
    repoURL: https://github.com/galin-s/aws-eks-terraform
    targetRevision: dev
    path: apps/nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true